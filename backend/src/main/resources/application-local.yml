spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:maplecore}
    username: ${DB_USER:mapleuser}
    password: ${DB_PASSWORD:maplepassword}
  jpa:
    hibernate:
      ddl-auto: update # For local dev, auto-updates columns (will use Flyway for real migrations later)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    com.maplecore.banking: DEBUG
