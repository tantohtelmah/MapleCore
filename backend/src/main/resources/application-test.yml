spring:
  datasource:
    url: jdbc:h2:mem:maplecoredb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false # Disable Flyway in tests to speed them up

logging:
  level:
    org.springframework: WARN
    com.maplecore.banking: DEBUG
