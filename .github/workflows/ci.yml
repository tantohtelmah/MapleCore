name: MapleCore CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Backend Tests
        run: |
          cd backend
          mvn clean test-compile

      - name: Run Backend Tests & Coverage
        run: |
          cd backend
          mvn test

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Build Package (JAR)
        run: |
          cd backend
          mvn package -DskipTests

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplecore-backend-jar
          path: backend/target/*.jar

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # We skip cache load if package-lock is not generated yet, npm install will generate it.
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplecore-frontend-build
          path: frontend/dist/

  docker-build:
    name: Docker Image Build Verification
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Simple docker build validation commands (if Dockerfiles are present later)
      - name: Verify Docker Environment
        run: |
          docker --version
          docker compose version
