version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maplecore-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-maplecore}
      POSTGRES_USER: ${DB_USER:-mapleuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-maplepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mapleuser} -d ${DB_NAME:-maplecore}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: maplecore-pgadmin
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maplecore.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:latest
    container_name: maplecore-mailhog
    ports:
      - "8025:8025" # Web interface
      - "1025:1025" # SMTP server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

volumes:
  postgres_data:
